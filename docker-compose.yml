services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:./data/dev.db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ELTON_OS_SECRET_KEY=${ELTON_OS_SECRET_KEY:?ELTON_OS_SECRET_KEY is required}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-false}
      - FIRECRAWL_MAX_PAGES_PER_RUN=${FIRECRAWL_MAX_PAGES_PER_RUN:-10}
      - FIRECRAWL_TIMEOUT_MS=${FIRECRAWL_TIMEOUT_MS:-30000}
      - SAFE_SOURCES_RUN_ENABLED=${SAFE_SOURCES_RUN_ENABLED:-false}
      - SAFE_SOURCES_MAX_PER_RUN=${SAFE_SOURCES_MAX_PER_RUN:-5}
      - SAFE_SOURCES_MAX_JOBS_PER_SOURCE=${SAFE_SOURCES_MAX_JOBS_PER_SOURCE:-20}
      - FIRECRAWL_DAILY_MAX_REQUESTS=${FIRECRAWL_DAILY_MAX_REQUESTS:-25}
      - FIRECRAWL_DAILY_MAX_JOBS_IMPORTED=${FIRECRAWL_DAILY_MAX_JOBS_IMPORTED:-50}
      - NEXT_PUBLIC_ELTON_DEMO_MODE=${NEXT_PUBLIC_ELTON_DEMO_MODE:-false}
    volumes:
      - data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  data:
